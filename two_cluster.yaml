# kubeconfig template for the two-kind SOU setup.
#
# This file contains placeholders instead of
# client certificates or private keys. Copy it to
# ~/.kube/snakemake-offloader/two-kind.yaml and replace all REPLACE_WITH_*
# values with the real values from the private kubeconfig.
apiVersion: v1
kind: Config
clusters:
  - name: kind-primary
    cluster:
      server: https://127.0.0.1:16443
      certificate-authority-data: 

  - name: kind-secondary
    cluster:
      server: https://127.0.0.1:26443
      certificate-authority-data: 

contexts:
  - name: primary
    context:
      cluster: kind-primary
      user: kind-primary
  - name: secondary
    context:
      cluster: kind-secondary
      user: kind-secondary
current-context: primary
users:
  - name: kind-primary
    user:
      client-certificate-data: 
      client-key-data: 

  - name: kind-secondary
    user:
      client-certificate-data: 
      client-key-data: 
