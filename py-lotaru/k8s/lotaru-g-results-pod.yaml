apiVersion: v1
kind: Pod
metadata:
  name: lotaru-benchmark-results
  labels:
    app: lotaru-benchmark-results
spec:
  restartPolicy: Never
  containers:
    - name: results
      image: alpine:3.20
      command:
        - sh
        - -c
        - sleep infinity
      volumeMounts:
        - name: results
          mountPath: /results
  volumes:
    - name: results
      persistentVolumeClaim:
        claimName: lotaru-benchmark-results
