apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lotaru-g-benchmark
  labels:
    app: lotaru-g-benchmark
spec:
  selector:
    matchLabels:
      app: lotaru-g-benchmark
  template:
    metadata:
      labels:
        app: lotaru-g-benchmark
    spec:
      restartPolicy: Always
      containers:
        - name: lotaru-g
          image: lotaru-g-benchmark:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - lotaru-g.sh --contention && echo "benchmark finished on ${NODE_NAME}" && sleep infinity
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OUT
              value: /results/lotaru-benchmark
            - name: SCRATCH
              value: /scratch
            - name: CONTENTION_RUNTIME
              value: "45"
          volumeMounts:
            - name: results
              mountPath: /results
            - name: scratch
              mountPath: /scratch
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: snakemake-shared
        - name: scratch
          hostPath:
            path: /var/tmp/lotaru-fio
            type: DirectoryOrCreate
